name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:

  # ── macOS (Apple Silicon) → DMG ────────────────────────────────────────────
  build-mac:
    name: macOS (Apple Silicon) DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)

          SIGN_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.+)"/\1/')
          echo "SIGN_ID=$SIGN_ID" >> "$GITHUB_ENV"

      - name: Build DMG
        run: mvn -Ppackage-mac verify -DskipTests -Dapp.version=${{ steps.ver.outputs.VERSION }}

      - name: Sign, notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls target/dist/*.dmg)

          # Extract .app from DMG
          hdiutil attach "$DMG" -mountpoint /tmp/dmg_src -readonly
          APP_NAME=$(ls -d /tmp/dmg_src/*.app | xargs basename)
          cp -r "/tmp/dmg_src/$APP_NAME" /tmp/
          hdiutil detach /tmp/dmg_src

          # Sign all .dylib files inside-out (JRE + JavaFX native libs)
          # codesign --deep is insufficient for jpackage bundles with bundled JRE
          find "/tmp/$APP_NAME" -type f -name "*.dylib" | sort | while read lib; do
            codesign --force --options runtime \
              --entitlements src/main/packaging/entitlements.plist \
              --sign "$SIGN_ID" "$lib"
          done

          # Sign nested executables (e.g. Contents/MacOS/*, runtime helpers)
          find "/tmp/$APP_NAME" -type f -perm +111 -not -name "*.dylib" | while read exe; do
            codesign --force --options runtime \
              --entitlements src/main/packaging/entitlements.plist \
              --sign "$SIGN_ID" "$exe" 2>/dev/null || true
          done

          # Sign the app bundle last
          codesign --force --options runtime \
            --entitlements src/main/packaging/entitlements.plist \
            --sign "$SIGN_ID" "/tmp/$APP_NAME"

          codesign --verify --deep --strict "/tmp/$APP_NAME"

          # Re-create DMG with signed .app
          hdiutil create -volname "Rufzeichen-Sucher" \
            -srcfolder "/tmp/$APP_NAME" \
            -ov -format UDZO "$DMG"

          # Sign DMG itself
          codesign --sign "$SIGN_ID" "$DMG"

          # Notarize – capture JSON output so we can fetch the Apple log on failure
          NOTARIZE_OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)
          echo "$NOTARIZE_OUT"

          NOTARIZE_STATUS=$(echo "$NOTARIZE_OUT" | jq -r '.status')
          NOTARIZE_ID=$(echo "$NOTARIZE_OUT" | jq -r '.id')

          if [ "$NOTARIZE_STATUS" != "Accepted" ]; then
            echo "Notarization rejected (status: $NOTARIZE_STATUS). Fetching Apple log..."
            xcrun notarytool log "$NOTARIZE_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

          # Embed notarization ticket into DMG
          xcrun stapler staple "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/dist/*.dmg

  # ── Windows → MSI ──────────────────────────────────────────────────────────
  build-win:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # jpackage requires WiX 3.x (candle.exe / light.exe).
      # We install 3.14.1 explicitly since newer WiX versions broke the CLI.
      - name: Install WiX Toolset 3.14
        shell: pwsh
        run: |
          Invoke-WebRequest "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314.exe" -OutFile wix314.exe
          .\wix314.exe /quiet /norestart
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\WiX Toolset v3.14\bin"

      - name: Build MSI
        run: mvn -Ppackage-win verify -DskipTests "-Dapp.version=${{ steps.ver.outputs.VERSION }}"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/dist/*.msi

  # ── Linux → DEB ────────────────────────────────────────────────────────────
  build-linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Build DEB
        run: mvn -Ppackage-linux verify -DskipTests -Dapp.version=${{ steps.ver.outputs.VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/dist/*.deb

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
            artifacts/linux-deb/*.deb
